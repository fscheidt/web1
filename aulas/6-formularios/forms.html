<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Formulários</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Reddit+Sans:ital,wght@0,200..900;1,200..900&display=swap');
    form > label { 
      display: grid;
      grid-template-columns: 120px max-content;
      gap: 10px;
      padding: .25rem 0;
    }
    label {
      user-select: none;
    }
    form > label > span {
      justify-self: right;
    }
    form {
      border: 1px solid #727272;
      border-radius: 4px;
      padding: .5rem;
      background-color: rgba(255, 255, 255, 0.9);
    }
    input[type="number"]{
      width: 150px;
    }
    body {
      font-family: 'Reddit Sans';
      /* background-image: url(https://ava.ifpr.edu.br/pluginfile.php/1/theme_boost_union/loginbackgroundimage/0/bg_login.png); */
      background-image: url("bg_login.png");
      background-attachment: fixed;
      background-position: right;
      background-size: cover;
      background-repeat: no-repeat;
    }
    input:required {
      border: 1px solid rgb(187, 14, 74);
    }
    input:required:valid {
      background-color: #7fffd4;
    }
    input:required:invalid {
      color: red;
    }
    
  </style>
</head>
<body>

  <form>
    <label>
      <span>username</span>
      <input 
        type="text" 
        name="user" 
        required 
        autocomplete="off"
        minlength="4" 
      />
    </label>

    <label>
      <span>email</span>
      <input type="email" name="email" required/>
    </label>

    <label>
      <span>senha</span>
      <input type="password" name="senha"/>
    </label> 

    <label>
      <span>estado</span>
      <select name="estado">
        <option value=""></option>
        <option value="PR"> Paraná </option>
        <option value="RS"> Rio Grande do Sul </option>
        <option value="SP"> São Paulo </option>
      </select>
    </label> 

    <label>
      <span>observações</span>
      <textarea cols="20" rows="4" name="observacoes"></textarea>
    </label>

    <label>
      <span>nascimento</span>
      <input 
        type="date" 
        name="nascimento"/>
    </label> 

    <label>
      <span>serviço</span>
      <div>
        <label>
          <input type="radio" name="quality" value="1"/>
          <span>bom</span> 
        </label>
        <label>
          <input type="radio" name="quality" value="2"/>
          <span>ruim</span> 
        </label>
      </div>
    </label> 

    <label>
      <span>idiomas</span>
      <div>
        <label>
          <input type="checkbox" name="idiomas" value="1"/>
          <span>inglês</span> 
        </label>
        <label>
          <input type="checkbox" name="idiomas" value="2"/>
          <span>espanhol</span> 
        </label>
      </div>
    </label> 

    <label>
      <span>telefone</span>
      <input type="text" disabled name="telefone" value="(45) 99990-0010"/>
    </label> 

    <label>
      <span></span>
      <input 
        placeholder="digite sua idade" 
        type="number" 
        min="12"
        max="120"
        name="idade"
        />
    </label> 

    <button>login</button>
  </form>
  
</body>
</html>
