<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pseudo classes</title>
  <style>
    /* pseudo classe */
    li:first-child{
      font-weight: bold;
    }
    li:last-child{
      color: red;
    }
    a:link {
      color: navy;
    }
    a:visited{
      color: #cc32a5;
    }
    a:hover{
      filter: invert(1);
    }
    tr:nth-child(2n){
      background-color: aquamarine;
    }
    tr:nth-child(2n+1){
      background-color: #f9ff7f;
    }
    
  </style>
</head>
<body>
  
  <ol>
    <li>item 1</li>
    <li>item 2</li>
    <li>item 3</li>
  </ol>

  <a href="https://developer.mozilla.org">mozila</a>

</html>
