<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loop</title>
</head>
<body>

  <script>
    document.write("<h1>titulo 1</h1>");
    document.write("<h2>titulo 2</h2>");
    
    for(let i=0; i < 10; i++){
      document.write(`<h3>titulo ${i+1}</h3>`);
    }
  </script>
  
</body>
</html>
